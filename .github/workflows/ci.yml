name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wallet:
    name: typecheck • audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { path: farmore-wallet }
      # Siblings so the file: deps and tsconfig paths resolve.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: farmore-network/farmore-sdk, ref: main, path: farmore-sdk }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: farmore-network/farmore-contracts, ref: main, path: farmore-contracts }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install (scripts disabled via .npmrc)
        working-directory: farmore-wallet
        run: npm ci || npm install

      - name: Typecheck
        working-directory: farmore-wallet
        run: npm test

      - name: Audit
        working-directory: farmore-wallet
        run: npm audit --audit-level=high

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
